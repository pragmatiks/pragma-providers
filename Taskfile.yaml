version: "3"

includes:
  gcp:
    taskfile: ./taskfiles/gcp.Taskfile.yaml
    dir: ./packages/gcp
  kubernetes:
    taskfile: ./taskfiles/kubernetes.Taskfile.yaml
    dir: ./packages/kubernetes
  qdrant:
    taskfile: ./taskfiles/qdrant.Taskfile.yaml
    dir: ./packages/qdrant
  agno:
    taskfile: ./taskfiles/agno.Taskfile.yaml
    dir: ./packages/agno
  supabase:
    taskfile: ./taskfiles/supabase.Taskfile.yaml
    dir: ./packages/supabase
  vercel:
    taskfile: ./taskfiles/vercel.Taskfile.yaml
    dir: ./packages/vercel

tasks:
  default: task --list-all

  install:
    desc: Install all provider dependencies
    cmd: uv sync --all-groups

  test:
    desc: Run all tests across all packages
    deps:
      - gcp:test
      - kubernetes:test
      - qdrant:test
      - agno:test
      - supabase:test
      - vercel:test

  format:
    desc: Format all Python code
    deps:
      - gcp:format
      - kubernetes:format
      - qdrant:format
      - agno:format
      - supabase:format
      - vercel:format

  check:
    desc: Run all checks (ruff + type checking)
    deps:
      - gcp:check
      - kubernetes:check
      - qdrant:check
      - agno:check
      - supabase:check
      - vercel:check
