[project]
name = "pragmatiks-supabase-provider"
version = "0.7.0"
description = "Supabase provider for Pragmatiks"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pragmatiks-sdk>=0.34.0",
    "httpx>=0.28.0",
]

authors = [
    { name = "Pragmatiks", email = "team@pragmatiks.io" },
]

[dependency-groups]
dev = [
    "pytest>=8.4.1",
    "pytest-asyncio>=1.0.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.14.0",
    "respx>=0.22.0",
    "ty>=0.0.14",
]

[tool.pragma]
# Provider metadata - used by the platform for discovery and deployment
provider = "supabase"
package = "supabase_provider"
display_name = "Supabase"
description = "Manage Supabase projects and configuration through declarative resources using the Management API."
icon_url = "https://cdn.simpleicons.org/supabase"
tags = ["supabase", "database", "authentication", "backend-as-a-service"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.7.0"
version_files = ["pyproject.toml:^version"]
tag_format = "supabase-v$version"
update_changelog_on_bump = true
changelog_file = "CHANGELOG.md"

[tool.ruff]
extend = "../../pyproject.toml"
line-length = 120

[tool.uv.build-backend]
module-name = "supabase_provider"

[build-system]
requires = ["uv_build>=0.9.8,<0.10.0"]
build-backend = "uv_build"
