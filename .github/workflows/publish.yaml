              cat bump_output.txt
              exit 1
            fi
          fi

      - name: Push version bumps and tags
        run: |
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main --follow-tags && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
