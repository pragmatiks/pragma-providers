    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        !startsWith(github.event.head_commit.message, 'bump:') &&
        (needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.github == 'true')
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
