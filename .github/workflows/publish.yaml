  publish-kubernetes:
    needs: [detect-changes, publish-gcp]
    # Runs if kubernetes or gcp changed (DAG propagation), or shared files changed.
    # Uses always() because publish-gcp may be skipped (no gcp changes), and we still
    # need kubernetes to run if only kubernetes files changed.
    if: >-
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.publish-gcp.result == 'success' || needs.publish-gcp.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          !startsWith(github.event.head_commit.message, 'bump:') &&
          (
            needs.detect-changes.outputs.shared == 'true' ||
            needs.detect-changes.outputs.kubernetes == 'true' ||
            needs.detect-changes.outputs.gcp == 'true'
          )
        )
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Pull latest changes
        run: git pull origin main

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Install pragma CLI
        run: uv tool install pragmatiks-cli

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Wait for PyPI availability
        if: needs.publish-gcp.outputs.version != ''
        run: |
          PACKAGE="pragmatiks-gcp-provider"
          VERSION="${{ needs.publish-gcp.outputs.version }}"
          echo "Waiting for $PACKAGE v$VERSION on PyPI..."
          for i in {1..30}; do
            if curl -sf "https://pypi.org/pypi/$PACKAGE/$VERSION/json" > /dev/null; then
              echo "Package available on PyPI"
              exit 0
            fi
            echo "Attempt $i: Package not yet available, waiting 10s..."
            sleep 10
          done
          echo "Timed out waiting for package on PyPI"
          exit 1

      - name: Bump and build
        id: bump
        run: |
          cd packages/kubernetes
          if cz bump --yes --changelog 2>&1 | tee bump_output.txt; then
            VERSION=$(cz version --project)
            echo "Bumped kubernetes to v$VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            uv build --package pragmatiks-kubernetes-provider --out-dir ../../dist
