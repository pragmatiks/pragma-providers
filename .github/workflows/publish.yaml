          PRAGMA_AUTH_TOKEN: ${{ secrets.PRAGMA_AUTH_TOKEN }}
        run: |
          cd packages/kubernetes
          pragma providers publish --version "${{ steps.bump.outputs.version }}" --org pragmatiks

  publish-qdrant:
    needs: [detect-changes, publish-kubernetes]
    # Runs if qdrant, kubernetes, or gcp changed (full DAG propagation), or shared files changed.
    if: >-
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.publish-kubernetes.result == 'success' || needs.publish-kubernetes.result == 'skipped') &&
