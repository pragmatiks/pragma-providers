      - name: Wait for PyPI availability
        if: needs.publish-kubernetes.outputs.version != ''
        run: |
          PACKAGE="pragmatiks-kubernetes-provider"
          VERSION="${{ needs.publish-kubernetes.outputs.version }}"
          echo "Waiting for $PACKAGE v$VERSION on PyPI..."
          for i in {1..30}; do
            if curl -sf "https://pypi.org/pypi/$PACKAGE/$VERSION/json" > /dev/null; then
              echo "Package available on PyPI"
              exit 0
            fi
            echo "Attempt $i: Package not yet available, waiting 10s..."
            sleep 10
          done
          echo "Timed out waiting for package on PyPI"
          exit 1

      - name: Bump and build
        id: bump
        run: |
          cd packages/qdrant
          if cz bump --yes --changelog 2>&1 | tee bump_output.txt; then
            VERSION=$(cz version --project)
            echo "Bumped qdrant to v$VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            uv build --package pragmatiks-qdrant-provider --out-dir ../../dist
          else
            if grep -qE "No commits found|is not a bump" bump_output.txt; then
              echo "No bump needed for qdrant"
            else
              cat bump_output.txt
              exit 1
            fi
          fi

      - name: Push version bumps and tags
        run: |
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main --follow-tags && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "Failed to push after 5 attempts"
          exit 1

      - name: Create GitHub Release
        if: steps.bump.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          gh release create "qdrant-v${VERSION}" \
            --title "pragmatiks-qdrant-provider v${VERSION}" \
            --generate-notes \
            dist/pragmatiks_qdrant_provider-${VERSION}* || echo "Release may already exist"

      - name: Publish to PyPI
        if: steps.bump.outputs.version != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
          attestations: false

      - name: Publish to pragma store
        if: steps.bump.outputs.version != ''
        env:
          PRAGMA_AUTH_TOKEN: ${{ secrets.PRAGMA_AUTH_TOKEN }}
        run: |
          cd packages/qdrant
          pragma providers publish --version "${{ steps.bump.outputs.version }}" --org pragmatiks

  publish-agno:
    needs: [detect-changes, publish-gcp, publish-kubernetes]
    # Runs if agno, gcp, or kubernetes changed (DAG propagation), or shared files changed.
    if: >-
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.publish-gcp.result == 'success' || needs.publish-gcp.result == 'skipped') &&
      (needs.publish-kubernetes.result == 'success' || needs.publish-kubernetes.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          !startsWith(github.event.head_commit.message, 'bump:') &&
          (
            needs.detect-changes.outputs.shared == 'true' ||
            needs.detect-changes.outputs.agno == 'true' ||
            needs.detect-changes.outputs.gcp == 'true' ||
            needs.detect-changes.outputs.kubernetes == 'true'
          )
        )
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Pull latest changes
        run: git pull origin main

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Install pragma CLI
        run: uv tool install pragmatiks-cli

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Wait for PyPI availability
        run: |
          wait_for_package() {
            local package=$1
            local version=$2
            echo "Waiting for $package v$version on PyPI..."
            for i in {1..30}; do
              if curl -sf "https://pypi.org/pypi/$package/$version/json" > /dev/null; then
                echo "Package available on PyPI"
                return 0
              fi
              echo "Attempt $i: Package not yet available, waiting 10s..."
              sleep 10
            done
            echo "Timed out waiting for $package v$version on PyPI"
            return 1
          }

          if [ -n "${{ needs.publish-gcp.outputs.version }}" ]; then
            wait_for_package pragmatiks-gcp-provider "${{ needs.publish-gcp.outputs.version }}"
          fi

          if [ -n "${{ needs.publish-kubernetes.outputs.version }}" ]; then
            wait_for_package pragmatiks-kubernetes-provider "${{ needs.publish-kubernetes.outputs.version }}"
          fi

      - name: Bump and build
        id: bump
        run: |
          cd packages/agno
          if cz bump --yes --changelog 2>&1 | tee bump_output.txt; then
            VERSION=$(cz version --project)
            echo "Bumped agno to v$VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            uv build --package pragmatiks-agno-provider --out-dir ../../dist
          else
            if grep -qE "No commits found|is not a bump" bump_output.txt; then
              echo "No bump needed for agno"
            else
              cat bump_output.txt
              exit 1
            fi
          fi

      - name: Push version bumps and tags
        run: |
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main --follow-tags && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "Failed to push after 5 attempts"
          exit 1

      - name: Create GitHub Release
        if: steps.bump.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          gh release create "agno-v${VERSION}" \
            --title "pragmatiks-agno-provider v${VERSION}" \
            --generate-notes \
            dist/pragmatiks_agno_provider-${VERSION}* || echo "Release may already exist"

      - name: Publish to PyPI
        if: steps.bump.outputs.version != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
          attestations: false

      - name: Publish to pragma store
        if: steps.bump.outputs.version != ''
        env:
          PRAGMA_AUTH_TOKEN: ${{ secrets.PRAGMA_AUTH_TOKEN }}
        run: |
          cd packages/agno
          pragma providers publish --version "${{ steps.bump.outputs.version }}" --org pragmatiks

      - name: Read runner transport version
        id: runner-transport
        run: |
          TRANSPORT=$(grep -E '^LABEL ai\.pragmatiks\.agno-runner\.transport=' packages/agno/runner/Dockerfile \
            | sed -E 's/.*transport="([^"]+)".*/\1/')
          if [ -z "$TRANSPORT" ]; then
            echo "Failed to parse agno-runner transport version from Dockerfile"
            exit 1
          fi
          echo "transport=$TRANSPORT" >> "$GITHUB_OUTPUT"
          echo "Runner transport version: $TRANSPORT"

      - name: Resolve provider version for image label
        id: runner-provider-version
        run: |
          cd packages/agno
          VERSION="${{ steps.bump.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(cz version --project)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Provider version for image: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agno runner image
        uses: docker/build-push-action@v6
        with:
          context: packages/agno
          file: packages/agno/runner/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            PROVIDER_VERSION=${{ steps.runner-provider-version.outputs.version }}
          tags: |
            ghcr.io/pragmatiks/agno-runner:${{ steps.runner-transport.outputs.transport }}
            ghcr.io/pragmatiks/agno-runner:latest
