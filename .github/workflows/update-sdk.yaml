name: Update SDK

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "New SDK version (e.g., 0.1.0a2)"
        required: true
        type: string

jobs:
  update-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.13

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update SDK version in all providers
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"

          for pyproject in packages/*/pyproject.toml; do
            echo "Updating $pyproject to SDK v${SDK_VERSION}"

            sed -i "s|pragmatiks-sdk>=.*\"|pragmatiks-sdk>=${SDK_VERSION}\"|" "$pyproject"
            sed -i "s|tag = \"v.*\"|tag = \"v${SDK_VERSION}\"|" "$pyproject"
          done

      - name: Wait for PyPI availability
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          echo "Waiting for pragmatiks-sdk==${SDK_VERSION} on PyPI..."
          for i in $(seq 1 60); do
            if curl -s "https://pypi.org/pypi/pragmatiks-sdk/json" | python3 -c "import sys,json; versions=json.load(sys.stdin)['releases'].keys(); sys.exit(0 if '${SDK_VERSION}' in versions else 1)" 2>/dev/null; then
              echo "Found pragmatiks-sdk==${SDK_VERSION} on PyPI"
              exit 0
            fi
            echo "Attempt ${i}/60: not yet available, waiting 10s..."
            sleep 10
          done
          echo "Timed out waiting for pragmatiks-sdk==${SDK_VERSION}"
          exit 1

      - name: Update lockfiles
        run: |
          for provider_dir in packages/*/; do
            echo "Updating lockfile in $provider_dir"
            cd "$provider_dir"
            uv lock --upgrade
            cd ../..
          done

      - name: Commit and push branch
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          BRANCH="chore/update-sdk-${SDK_VERSION}"

          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "skip_pr=true" >> "$GITHUB_ENV"
          else
            git checkout -b "$BRANCH"
            git commit -m "chore(deps): update pragmatiks-sdk to v${SDK_VERSION}"
            git push -u origin "$BRANCH"
          fi

      - name: Create and merge PR
        if: env.skip_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          gh pr create \
            --title "chore(deps): update pragmatiks-sdk to v${SDK_VERSION}" \
            --body "Automated SDK version bump to \`v${SDK_VERSION}\`."
          gh pr merge --squash
